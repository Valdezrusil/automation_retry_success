<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webshare Proxy Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --error-color: #ef4444;
            --success-color: #10b981;
            --border-color: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--container-bg);
            padding: 3rem 2.5rem;
            border-radius: 1.2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.4);
            max-width: 450px;
            width: 100%;
            transition: all 0.3s ease;
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
            margin-bottom: 2rem;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        button:disabled {
            background-color: #475569;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Stepper UI */
        .stepper {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            display: none;
            margin-bottom: 1rem;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .step-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        /* Active State */
        .step-item.active {
            color: var(--text-color);
        }
        .step-item.active .step-icon {
            border-color: var(--accent-color);
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }

        /* Completed State */
        .step-item.completed {
            color: var(--success-color);
        }
        .step-item.completed .step-icon {
            border-color: var(--success-color);
            background-color: var(--success-color);
            color: var(--bg-color);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            color: var(--error-color);
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
            word-wrap: break-word;
        }

        .proxies-container {
            margin-top: 2rem;
            background-color: #0f172a;
            border-radius: 0.5rem;
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            border: 1px solid var(--border-color);
        }

        .proxy-item {
            font-family: 'Courier New', Courier, monospace;
            padding: 0.75rem;
            border-bottom: 1px solid var(--container-bg);
            color: #e2e8f0;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .proxy-item:last-child {
            border-bottom: none;
        }

        .copy-btn {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 0.8rem;
            padding: 0.25rem 0.5rem;
            cursor: pointer;
            box-shadow: none;
            width: auto;
            margin: 0;
            border-radius: 0.25rem;
            font-weight: 500;
        }
        .copy-btn:hover {
            background-color: rgba(59, 130, 246, 0.1);
            box-shadow: none;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Proxy Generator</h1>
        <button id="startBtn">Generate Now</button>

        <!-- Stepper -->
        <div class="stepper" id="stepper">
            <div class="step-item" id="step-1">
                <div class="step-icon"></div>
                <span>Initializing Cloud Browser</span>
            </div>
            <div class="step-item" id="step-2">
                <div class="step-icon"></div>
                <span>Retrieving Temporary Email</span>
            </div>
            <div class="step-item" id="step-3">
                <div class="step-icon"></div>
                <span>Submitting Registration</span>
            </div>
            <div class="step-item" id="step-4">
                <div class="step-icon"></div>
                <span>Verifying Account (reCAPTCHA)</span>
            </div>
            <div class="step-item" id="step-5">
                <div class="step-icon"></div>
                <span>Extracting Proxies</span>
            </div>
        </div>

        <div id="errorBox" class="error-message"></div>
        
        <div id="liveSessionBox" style="display: none; margin-top: 1rem; text-align: center; padding: 0.75rem; background-color: rgba(59, 130, 246, 0.1); border-radius: 0.5rem; border: 1px solid rgba(59, 130, 246, 0.2);">
            <a id="liveSessionLink" href="#" target="_blank" style="color: var(--accent-color); font-weight: 600; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                Watch Live Browser Session
            </a>
        </div>
        
        <div id="proxiesBox" class="proxies-container"></div>
    </div>

    <script>
        const btn = document.getElementById('startBtn');
        const stepper = document.getElementById('stepper');
        const errorBox = document.getElementById('errorBox');
        const proxiesBox = document.getElementById('proxiesBox');

        let eventSource = null;

        function resetUI() {
            btn.disabled = true;
            btn.textContent = 'Processing...';
            stepper.style.display = 'flex';
            errorBox.style.display = 'none';
            proxiesBox.style.display = 'none';
            proxiesBox.innerHTML = '';
            document.getElementById('liveSessionBox').style.display = 'none';
            
            for (let i = 1; i <= 5; i++) {
                const el = document.getElementById(`step-${i}`);
                el.className = 'step-item';
                el.querySelector('.step-icon').innerHTML = '';
            }
        }

        function markStepActive(stepNum) {
            // Mark previous steps as completed
            for (let i = 1; i < stepNum; i++) {
                const el = document.getElementById(`step-${i}`);
                if (!el.classList.contains('completed')) {
                    el.className = 'step-item completed';
                    el.querySelector('.step-icon').innerHTML = '✓';
                }
            }
            // Mark current step as active
            const current = document.getElementById(`step-${stepNum}`);
            if (current) {
                current.className = 'step-item active';
            }
        }

        function markAllCompleted() {
            for (let i = 1; i <= 5; i++) {
                const el = document.getElementById(`step-${i}`);
                el.className = 'step-item completed';
                el.querySelector('.step-icon').innerHTML = '✓';
            }
        }

        function showError(message) {
            errorBox.textContent = message;
            errorBox.style.display = 'block';
            
            // Mark the active step as error (red border)
            const activeStep = document.querySelector('.step-item.active');
            if (activeStep) {
                activeStep.classList.remove('active');
                activeStep.style.color = 'var(--error-color)';
                const icon = activeStep.querySelector('.step-icon');
                icon.style.animation = 'none';
                icon.style.borderColor = 'var(--error-color)';
                icon.innerHTML = '✗';
            }

            btn.disabled = false;
            btn.textContent = 'Retry Generation';
            if (eventSource) {
                eventSource.close();
            }
        }

        btn.addEventListener('click', () => {
            resetUI();
            
            // Close any existing connection
            if (eventSource) {
                eventSource.close();
            }

            eventSource = new EventSource('/api/start');

            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);

                    if (data.status === 'step') {
                        markStepActive(data.step_num);
                    } 
                    else if (data.status === 'info' && data.live_url) {
                        const liveBox = document.getElementById('liveSessionBox');
                        const liveLink = document.getElementById('liveSessionLink');
                        liveLink.href = data.live_url;
                        liveBox.style.display = 'block';
                    }
                    else if (data.status === 'error') {
                        // Extract only safe error intro
                        let msg = data.message || 'Unknown error occurred.';
                        showError(msg);
                    }
                    else if (data.status === 'success') {
                        markAllCompleted();
                        
                        // Render proxies
                        if (data.proxies && data.proxies.length > 0) {
                            data.proxies.forEach(p => {
                                const div = document.createElement('div');
                                div.className = 'proxy-item';
                                
                                const textSpan = document.createElement('span');
                                textSpan.textContent = p;
                                
                                const copyBtn = document.createElement('button');
                                copyBtn.className = 'copy-btn';
                                copyBtn.textContent = 'Copy';
                                copyBtn.onclick = () => {
                                    navigator.clipboard.writeText(p);
                                    copyBtn.textContent = 'Copied!';
                                    setTimeout(() => copyBtn.textContent = 'Copy', 2000);
                                };

                                div.appendChild(textSpan);
                                div.appendChild(copyBtn);
                                proxiesBox.appendChild(div);
                            });
                            proxiesBox.style.display = 'block';
                        }
                        
                        btn.disabled = false;
                        btn.textContent = 'Generate Again';
                        eventSource.close();
                    }

                } catch (e) {
                    showError("Failed to parse server response.");
                }
            };

            eventSource.onerror = function(err) {
                if (eventSource.readyState === EventSource.CLOSED) {
                    return;
                }
                showError("Connection lost. Please try again.");
                eventSource.close();
            };
        });
    </script>
</body>
</html>
